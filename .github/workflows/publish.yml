name: Publish (manual break-glass)

# Normal releases are automated by release.yml (changeset-driven, on push to master).
# This workflow is a manual fallback: trigger it from the Actions tab to build, test, and
# publish the CURRENT package.json version to npm — e.g. if an automated release half-failed.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + test (gate before publish)
        run: |
          npm run build
          npm test

      - name: Publish current version to npm (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "copilot-reverse@$VERSION" version >/dev/null 2>&1; then
            echo "copilot-reverse@$VERSION already on npm — nothing to do"
          else
            npm publish --access public
          fi
