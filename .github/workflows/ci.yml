name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # better-sqlite3 is a native module; ubuntu runners have the build toolchain.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Check src/version.ts is in sync with package.json
        run: |
          node scripts/gen-version.mjs
          git diff --exit-code src/version.ts \
            || (echo "::error::src/version.ts is stale — run 'node scripts/gen-version.mjs' and commit" && exit 1)

      - name: Run tests
        run: npm test

  coverage:
    runs-on: ubuntu-latest
    name: coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
