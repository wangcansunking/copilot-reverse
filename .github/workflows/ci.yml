name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # better-sqlite3 is a native module; ubuntu runners have the build toolchain.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Check generated sources are in sync
        run: |
          node scripts/gen-version.mjs
          node scripts/gen-changes.mjs
          git diff --exit-code src/version.ts src/changes.ts \
            || (echo "::error::src/version.ts or src/changes.ts is stale — run the gen-* scripts and commit" && exit 1)

      - name: Run tests
        run: npm test

  changeset:
    # Every behavior PR must ship a changeset, else release.yml skips publish and npm stays stale
    # (the v0.5.3 freeze). Docs/test-only PRs are exempt via a "no-changeset" label.
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-changeset')
    runs-on: ubuntu-latest
    name: changeset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Require a changeset
        run: |
          if [ "$(node scripts/changesets.mjs status | node -p 'JSON.parse(require("fs").readFileSync(0)).hasChangeset')" = "true" ]; then
            echo "changeset present"
          else
            echo "::error::No changeset in .changes/. Add one: node scripts/changesets.mjs new <patch|minor|major> <slug>. Docs/test-only? Label the PR 'no-changeset'."
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    name: coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  docker-e2e:
    runs-on: ubuntu-latest
    name: docker-e2e
    env:
      CR_GH_TOKEN: ${{ secrets.CR_GH_TOKEN }}
      CR_WEBIQ: ${{ secrets.CR_WEBIQ }}
    steps:
      - uses: actions/checkout@v4

      # HTTP edge-case matrix: real worker + supervisor driven over HTTP, hermetic (dummy token).
      # No secret needed — covers error paths, supervision lifecycle, and the crash-guard regression.
      - name: HTTP edge e2e
        run: |
          docker build -f e2e/docker/Dockerfile.http -t cr-http-e2e .
          docker run --rm cr-http-e2e

      # Real CLI e2e: actual claude + codex against the daemon. Needs a real token, so it only runs
      # when CR_GH_TOKEN is configured (forks / no-secret pushes skip it, keeping CI green). The token
      # (and optional WebIQ key) are written to mount files at runtime — never baked into the image.
      # NOTE: `secrets` can't be used in a step `if:`, so gate on the env value instead.
      - name: Real CLI e2e (gated on token secret)
        if: ${{ env.CR_GH_TOKEN != '' }}
        run: |
          mkdir -p secrets out
          printf '{"ghToken":"%s"}' "$CR_GH_TOKEN" > secrets/creds.json
          MOUNTS=(-v "$PWD/secrets/creds.json:/root/.copilot-reverse/creds.json:ro" -v "$PWD/out:/out")
          if [ -n "$CR_WEBIQ" ]; then
            printf '{"key":"%s"}' "$CR_WEBIQ" > secrets/webiq.json
            MOUNTS+=(-v "$PWD/secrets/webiq.json:/root/.copilot-reverse/webiq.json:ro")
          fi
          docker build -f e2e/docker/Dockerfile.cli -t cr-cli-e2e .
          docker run --rm "${MOUNTS[@]}" cr-cli-e2e


